name: Cypress Test Suite

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone practice software testing app
        run: git clone https://github.com/testsmith-io/practice-software-testing.git

      - name: Start app with Docker
        run: |
          cd practice-software-testing
          docker compose up -d
          echo "Waiting for containers to initialize..."
          sleep 30

      - name: Install composer dependencies
        run: |
          docker compose -f practice-software-testing/docker-compose.yml exec --user root -T laravel-api composer install --no-dev --ignore-platform-reqs

      - name: Check if env exists
        run: |
          docker compose -f practice-software-testing/docker-compose.yml exec -T laravel-api ls -la .env || echo "No .env file found"

      - name: Check docker compose env vars
        run: |
          cat practice-software-testing/docker-compose.yml

      - name: Setup Laravel environment
        run: |
          docker compose -f practice-software-testing/docker-compose.yml exec --user root -T laravel-api cp .env.example .env
          docker compose -f practice-software-testing/docker-compose.yml exec --user root -T laravel-api php artisan key:generate

      - name: Setup Laravel storage
        run: |
          docker compose -f practice-software-testing/docker-compose.yml exec --user root -T laravel-api chmod -R 777 storage
          docker compose -f practice-software-testing/docker-compose.yml exec --user root -T laravel-api chmod -R 777 bootstrap/cache

      - name: Run database migrations and seed
        run: |
          docker compose -f practice-software-testing/docker-compose.yml exec --user root -T laravel-api php artisan migrate:fresh --seed

      - name: Wait for API to be ready
        run: |
          echo "Waiting for API..."
          for i in {1..30}; do
            if curl -s http://localhost:8091/categories/tree | grep -q "id"; then
              echo "API is ready!"
              break
            fi
            echo "Attempt $i: API not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend..."
          for i in {1..30}; do
            if curl -s http://localhost:4200 | grep -q "html"; then
              echo "Frontend is ready!"
              break
            fi
            echo "Attempt $i: Frontend not ready yet, waiting 10s..."
            sleep 10
          done

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Cypress tests
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-logs
          path: cypress/logs/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
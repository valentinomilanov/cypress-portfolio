name: Cypress Parallel Suite

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup app
        uses: ./.github/actions/setup-app
      - name: Run smoke tests
        run: npx cypress run --spec "cypress/e2e/smoke.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-smoke
          path: cypress/logs/

  ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup app
        uses: ./.github/actions/setup-app
      - name: Run UI tests
        run: npx cypress run --spec "cypress/e2e/ui/**/*.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-ui
          path: cypress/logs/
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-ui
          path: cypress/screenshots/

  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup app
        uses: ./.github/actions/setup-app
      - name: Run API tests
        run: npx cypress run --spec "cypress/e2e/api/**/*.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-api
          path: cypress/logs/
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-api
          path: cypress/screenshots/

  accessibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup app
        uses: ./.github/actions/setup-app
      - name: Run accessibility tests
        run: npx cypress run --spec "cypress/e2e/accessibility/**/*.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-accessibility
          path: cypress/logs/
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-accessibility
          path: cypress/screenshots/
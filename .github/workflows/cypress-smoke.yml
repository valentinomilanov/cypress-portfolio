name: Cypress Smoke Test

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup app
        uses: ./.github/actions/setup-app

      - name: Run smoke test
        run: npx cypress run --spec "cypress/e2e/smoke.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-smoke
          path: cypress/logs/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-smoke
          path: cypress/screenshots/

name: Cypress Sequential Suite

on:
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup app
        uses: ./.github/actions/setup-app

      - name: Run smoke tests
        run: npx cypress run --spec "cypress/e2e/smoke.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091

      - name: Run UI tests
        run: npx cypress run --spec "cypress/e2e/ui/**/*.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091

      - name: Run API tests
        run: npx cypress run --spec "cypress/e2e/api/**/*.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091

      - name: Run accessibility tests
        run: npx cypress run --spec "cypress/e2e/accessibility/**/*.cy.js"
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-logs
          path: cypress/logs/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
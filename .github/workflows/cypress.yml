name: Cypress Test Suite

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone practice software testing app
        run: git clone https://github.com/testsmith-io/practice-software-testing.git

      - name: Start app with Docker
        run: |
          cd practice-software-testing
          docker compose up -d

      - name: Install composer dependencies
        run: |
          docker compose -f practice-software-testing/docker-compose.yml exec --user root -T laravel-api composer install --no-dev --ignore-platform-reqs

      - name: Run database migrations and seed
        run: |
          docker compose -f practice-software-testing/docker-compose.yml exec --user root -T laravel-api php artisan migrate:fresh --seed

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app to be ready..."
          sleep 60
          curl --retry 10 --retry-delay 5 --retry-connrefused http://localhost:4200

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Cypress tests
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:4200
          CYPRESS_API_URL: http://localhost:8091

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-logs
          path: cypress/logs/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
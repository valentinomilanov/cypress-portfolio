name: Cypress Test Suite

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run smoke tests
        run: npx cypress run --spec "cypress/e2e/smoke.cy.js"

      - name: Wait between suites
        run: sleep 20

      - name: Run API tests
        run: npx cypress run --spec "cypress/e2e/api/**/*.cy.js"

      - name: Wait between suites
        run: sleep 20

      - name: Run UI tests
        run: npx cypress run --spec "cypress/e2e/ui/**/*.cy.js"

      - name: Wait between suites
        run: sleep 20

      - name: Run accessibility tests
        run: npx cypress run --spec "cypress/e2e/accessibility/**/*.cy.js"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-logs
          path: cypress/logs/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/